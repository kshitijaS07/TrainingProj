<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Expense Tracker Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#0ea5e9);
padding:20px;
}

.container{
width:1000px;
display:flex;
overflow:hidden;
border-radius:30px;
background:rgba(255,255,255,.1);
backdrop-filter:blur(20px);
box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.left{
width:50%;
padding:60px;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
}

.logo{
font-size:32px;
font-weight:700;
margin-bottom:25px;
}

.left h1{
font-size:48px;
margin-bottom:15px;
}

.left p{
line-height:1.8;
opacity:.9;
}

.right{
width:50%;
background:white;
padding:60px;
}

.form-title{
font-size:34px;
font-weight:700;
margin-bottom:10px;
color:#0f172a;
}

.subtitle{
color:#64748b;
margin-bottom:30px;
}

input{
width:100%;
padding:15px;
margin-bottom:18px;
border:1px solid #cbd5e1;
border-radius:12px;
font-size:15px;
outline:none;
}

input:focus{
border-color:#0ea5e9;
}

button{
width:100%;
padding:15px;
border:none;
background:linear-gradient(135deg,#0ea5e9,#2563eb);
color:white;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.error{
background:#fee2e2;
color:#dc2626;
padding:12px;
border-radius:10px;
margin-bottom:15px;
text-align:center;
}

.link{
margin-top:20px;
text-align:center;
}

.link a{
text-decoration:none;
color:#2563eb;
font-weight:600;
}

@media(max-width:900px){

.container{
flex-direction:column;
}

.left,
.right{
width:100%;
}

.left{
text-align:center;
padding:40px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="left">

<div class="logo">
💰 Expense Tracker Pro
</div>

<h1>Manage Money Smarter</h1>

<p>
Track your income, expenses and savings with a modern financial dashboard designed to help you stay in control of every rupee.
</p>

</div>

<div class="right">

<div class="form-title">
Welcome Back
</div>

<div class="subtitle">
Sign in to continue
</div>

{% if error %}
<div class="error">
{{ error }}
</div>
{% endif %}

<form action="/login" method="POST">

<input
type="email"
name="email"
placeholder="Email Address"
required
>

<input
type="password"
name="password"
placeholder="Password"
required
>

<button type="submit">
Login
</button>

</form>

<div class="link">
Don't have an account?
<a href="/signup">Create Account</a>
</div>

</div>

</div>

</body>
</html>
