<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Expense</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:600px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#8b5e34;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#6f4825;
}

.back{
    display:block;
    text-align:center;
    margin-top:15px;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h1>Add Expense</h1>

<form action="/create" method="POST">

<input
type="text"
name="title"
placeholder="Expense Title"
required
>

<input
type="number"
step="0.01"
name="amount"
placeholder="Amount"
required
>

<select name="category" required>

<option value="">Select Category</option>
<option>Food</option>
<option>Shopping</option>
<option>Travel</option>
<option>Bills</option>
<option>Education</option>

</select>

<select name="expense_type" required>

<option value="">Select Type</option>
<option>Expense</option>
<option>Income</option>

</select>

<textarea
name="note"
placeholder="Notes"
></textarea>

<input
type="date"
name="date"
required
>

<button type="submit">
Save Expense
</button>

</form>

<a href="/" class="back">
Back to Dashboard
</a>

</div>

</body>
</html>
